<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StageSimulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #2ecc71; --green-d: #27ae60;
  --orange: #e67e22; --orange-d: #d35400;
  --red: #e74c3c; --red-d: #c0392b;
  --blue: #3498db; --blue-d: #2980b9;
  --yellow: #f1c40f; --yellow-d: #f39c12;
  --purple: #9b59b6; --purple-d: #8e44ad;
  --bg: #1a1a2e; --card: #16213e; --card2: #0f3460;
  --text: #eee; --muted: #aaa;
  --radius: 16px; --radius-sm: 10px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 680px; padding: 1rem; min-height: 100vh; flex-direction: column; align-items: center; }
.screen.active { display: flex; }

/* ── HOME ── */
#home { justify-content: center; gap: 1.5rem; text-align: center; padding: 2rem 1rem; }
.logo { font-size: 3rem; }
.home-title { font-size: 2rem; font-weight: 900; line-height: 1.1; }
.home-title span { color: var(--yellow); }
.home-sub { color: var(--muted); font-size: 1rem; }

.place-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; margin-top: 0.5rem; }
.place-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.5rem 1rem;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}
.place-card:hover, .place-card:active { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.place-card .icon { font-size: 2.8rem; }
.place-card .name { font-weight: 800; font-size: 1rem; }
.place-card .tagline { font-size: 0.75rem; color: var(--muted); }
.place-card.intratuin { border-color: var(--green); }
.place-card.intratuin:hover { background: rgba(46,204,113,0.1); }
.place-card.papendal { border-color: var(--blue); }
.place-card.papendal:hover { background: rgba(52,152,219,0.1); }
.place-card.mcdonalds { border-color: var(--yellow); }
.place-card.mcdonalds:hover { background: rgba(241,196,15,0.1); }
.place-card.scalabor { border-color: var(--purple); }
.place-card.scalabor:hover { background: rgba(155,89,182,0.1); }

/* ── ROLE SELECT ── */
#roleselect { justify-content: flex-start; gap: 1rem; padding-top: 1.5rem; }
.back-btn {
  align-self: flex-start;
  background: transparent; border: 2px solid var(--muted);
  color: var(--muted); border-radius: 999px; padding: 0.4rem 1rem;
  font-family: 'Nunito', sans-serif; font-size: 0.9rem; cursor: pointer;
  transition: all 0.15s;
}
.back-btn:hover { border-color: var(--text); color: var(--text); }
.section-title { font-size: 1.4rem; font-weight: 800; text-align: center; }
.section-sub { color: var(--muted); font-size: 0.9rem; text-align: center; }
.role-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; width: 100%; }
.role-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 1rem;
}
.role-card:hover { transform: translateX(4px); }
.role-card .role-icon { font-size: 2rem; flex-shrink: 0; }
.role-card .role-info { flex: 1; }
.role-card .role-name { font-weight: 800; font-size: 1rem; }
.role-card .role-desc { font-size: 0.8rem; color: var(--muted); }

/* ── GAME HUD ── */
#game { justify-content: flex-start; gap: 0; padding: 0; }
.hud {
  width: 100%; background: var(--card);
  padding: 0.75rem 1rem;
  display: flex; align-items: center; gap: 0.75rem;
  border-bottom: 2px solid var(--card2);
  flex-shrink: 0;
}
.hud-place { font-size: 1.1rem; font-weight: 900; flex: 1; }
.hud-score { font-size: 0.85rem; background: var(--card2); border-radius: 999px; padding: 0.3rem 0.8rem; font-weight: 700; }
.hud-level { font-size: 0.85rem; color: var(--yellow); font-weight: 700; }
.hud-stars { font-size: 1rem; letter-spacing: 0.1em; }

/* timer bar */
.timer-bar-wrap { width: 100%; height: 8px; background: var(--card2); flex-shrink: 0; }
.timer-bar { height: 100%; background: var(--green); transition: width 0.1s linear, background 0.3s; border-radius: 0 4px 4px 0; }

/* game area */
.game-area { flex: 1; width: 100%; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; overflow-y: auto; }

/* scenario card */
.scenario-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.2rem;
  display: flex; align-items: flex-start; gap: 1rem;
  border-left: 5px solid var(--yellow);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform:none; } }
.scenario-icon { font-size: 2.2rem; flex-shrink: 0; }
.scenario-text { font-size: 1rem; font-weight: 700; line-height: 1.4; }
.scenario-subtext { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }

/* choices */
.choices { display: flex; flex-direction: column; gap: 0.6rem; }
.choice-btn {
  background: var(--card2);
  border: 3px solid transparent;
  border-radius: var(--radius-sm);
  padding: 0.9rem 1.2rem;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer;
  text-align: left;
  display: flex; align-items: center; gap: 0.75rem;
  transition: all 0.15s;
  animation: slideIn 0.3s ease both;
}
.choice-btn:nth-child(1) { animation-delay: 0.05s; }
.choice-btn:nth-child(2) { animation-delay: 0.1s; }
.choice-btn:nth-child(3) { animation-delay: 0.15s; }
.choice-btn:hover { border-color: var(--yellow); background: rgba(241,196,15,0.08); transform: translateX(3px); }
.choice-btn .choice-icon { font-size: 1.4rem; flex-shrink: 0; }
.choice-btn.correct { border-color: var(--green); background: rgba(46,204,113,0.15); pointer-events: none; }
.choice-btn.wrong { border-color: var(--red); background: rgba(231,76,60,0.15); pointer-events: none; }
.choice-btn.reveal { border-color: var(--green); opacity: 0.6; pointer-events: none; }
.choice-btn:disabled { pointer-events: none; }

/* click game */
.click-area {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1rem;
  display: flex; flex-direction: column; gap: 0.75rem;
}
.click-title { font-weight: 800; font-size: 0.95rem; }
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.6rem; }
.item-btn {
  background: var(--card2);
  border: 3px solid transparent;
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.4rem;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
  transition: all 0.15s;
  font-family: 'Nunito', sans-serif;
}
.item-btn .item-icon { font-size: 1.8rem; }
.item-btn .item-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-align: center; line-height: 1.2; }
.item-btn:hover { border-color: var(--yellow); transform: scale(1.05); }
.item-btn.selected { border-color: var(--blue); background: rgba(52,152,219,0.15); }
.item-btn.correct { border-color: var(--green); background: rgba(46,204,113,0.2); animation: pop 0.3s ease; }
.item-btn.wrong { border-color: var(--red); background: rgba(231,76,60,0.2); animation: shake 0.3s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} 100%{transform:translateX(0)} }

/* order display */
.order-display {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  display: flex; align-items: center; gap: 0.5rem;
  flex-wrap: wrap;
}
.order-item { font-size: 1.4rem; }
.order-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); }

/* feedback toast */
.feedback-toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: white;
  border-radius: 999px; padding: 0.6rem 1.5rem;
  font-weight: 800; font-size: 1rem;
  pointer-events: none; z-index: 100;
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
}
.feedback-toast.show { opacity: 1; }
.feedback-toast.bad { background: var(--red); }

/* progress dots */
.progress-dots { display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--card2); transition: background 0.2s; }
.dot.done { background: var(--green); }
.dot.current { background: var(--yellow); }
.dot.fail { background: var(--red); }

/* result screen */
#result { justify-content: center; gap: 1.2rem; text-align: center; padding: 2rem 1rem; }
.result-emoji { font-size: 5rem; animation: pop 0.5s ease; }
.result-title { font-size: 1.8rem; font-weight: 900; }
.result-score { font-size: 1.1rem; color: var(--muted); }
.result-stars { font-size: 2rem; letter-spacing: 0.2em; }
.result-tip { background: var(--card); border-radius: var(--radius); padding: 1rem; font-size: 0.9rem; line-height: 1.5; color: var(--muted); max-width: 400px; }
.btn-primary {
  background: var(--yellow); color: #1a1a2e;
  border: none; border-radius: 999px;
  padding: 0.9rem 2.5rem;
  font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(241,196,15,0.4);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(241,196,15,0.5); }

/* plant request bubble */
.plant-bubble {
  position: absolute; top: -28px; right: -8px;
  background: var(--blue); color: white;
  border-radius: 999px; padding: 2px 8px;
  font-size: 0.65rem; font-weight: 800;
  white-space: nowrap; pointer-events: none;
  animation: bounce 1s ease infinite;
}
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.item-btn { position: relative; }

.volgende-btn {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 1rem;
  font-family: 'Nunito', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
  animation: slideIn 0.2s ease;
}
.volgende-btn:hover { background: var(--green-d); transform: translateY(-2px); }

@keyframes shake { 0%,100%{transform:translateX(0) rotate(0)} 25%{transform:translateX(-4px) rotate(-8deg)} 75%{transform:translateX(4px) rotate(8deg)} }
@media(max-width:400px){
  .place-grid { grid-template-columns: 1fr 1fr; }
  .items-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- FEEDBACK TOAST -->
<div class="feedback-toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo">🎓</div>
  <div class="home-title">Stage<span>Simulator</span></div>
  <div class="home-sub">Kies waar jij stage gaat lopen</div>
  <div class="place-grid" style="grid-template-columns:1fr 1fr 1fr;">
    <div class="place-card intratuin" onclick="selectPlace('intratuin')">
      <div class="icon">🌿</div>
      <div class="name">Intratuin / Scalabor</div>
      <div class="tagline">Horeca, winkel & magazijn</div>
    </div>
    <div class="place-card papendal" onclick="selectPlace('papendal')">
      <div class="icon">🏟️</div>
      <div class="name">Papendal</div>
      <div class="tagline">Sportkantine & vergadering</div>
    </div>
    <div class="place-card mcdonalds" onclick="selectPlace('mcdonalds')">
      <div class="icon">🍔</div>
      <div class="name">McDonald's</div>
      <div class="tagline">Keuken & kassa</div>
    </div>
  </div>
</div>

<!-- ROLE SELECT -->
<div class="screen" id="roleselect">
  <button class="back-btn" onclick="showScreen('home')">← Terug</button>
  <div class="section-title" id="role-title">Kies jouw rol</div>
  <div class="section-sub" id="role-sub">Wat ga jij doen vandaag?</div>
  <div class="role-grid" id="role-grid"></div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="hud">
    <div class="hud-place" id="hud-place">🌿 Intratuin</div>
    <div class="hud-stars" id="hud-stars">⭐⭐⭐</div>
    <div class="hud-level" id="hud-level">Lvl 1</div>
    <div class="hud-score" id="hud-score">0 pts</div>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
  <div class="game-area" id="game-area"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">Goed gedaan!</div>
  <div class="result-stars" id="result-stars">⭐⭐⭐</div>
  <div class="result-score" id="result-score">Je scoorde 0 punten</div>
  <div class="result-tip" id="result-tip"></div>
  <button class="btn-primary" onclick="playAgain()">Nog een keer 🔄</button>
  <button class="btn-primary" onclick="maakScreenshot()" style="background:var(--blue);box-shadow:0 4px 12px rgba(52,152,219,0.4);margin-top:0.5rem">📸 Sla score op</button>
  <button class="back-btn" onclick="showScreen('home')" style="margin-top:0.5rem">← Andere plek kiezen</button>
  <div id="screenshot-status" style="font-size:0.85rem;color:var(--muted);min-height:1.4rem;text-align:center;margin-top:0.25rem;"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════

const PLACES = {
  intratuin: {
    name: '🌿 Intratuin / Scalabor',
    color: '#2ecc71',
    roles: [
      { id: 'horeca', icon: '☕', name: 'Horeca / Koffiebar', desc: 'Bestellingen opnemen en klaarmaken' },
      { id: 'winkel', icon: '🛒', name: 'Winkel', desc: 'Klanten helpen, vakken vullen, planten verzorgen' },
      { id: 'magazijn', icon: '📦', name: 'Magazijn', desc: 'Dozen uitpakken, opslaan en leveren' }
    ]
  },
  papendal: {
    name: '🏟️ Papendal',
    color: '#3498db',
    roles: [
      { id: 'bediening', icon: '🍽️', name: 'Bediening', desc: 'Sporters bedienen in de kantine' },
      { id: 'keuken', icon: '👨‍🍳', name: 'Keuken', desc: 'Eten klaarmaken en uitserveren' },
      { id: 'vergadering', icon: '🪑', name: 'Vergaderzalen', desc: 'Zalen klaarzetten en opruimen' }
    ]
  },
  mcdonalds: {
    name: '🍔 McDonald\'s',
    color: '#f1c40f',
    roles: [
      { id: 'kassa', icon: '🧾', name: 'Kassa', desc: 'Bestellingen opnemen en afrekenen' },
      { id: 'keuken_mc', icon: '🍟', name: 'Keuken', desc: 'Burgers en friet klaarmaken' },
      { id: 'schoon', icon: '🧹', name: 'Schoonmaak', desc: 'Restaurant schoon en netjes houden' }
    ]
  },
};

// ═══════════════════════════════════════════════
// SCENARIO BUILDERS
// ═══════════════════════════════════════════════

function getScenarios(place, role, level) {
  const hard = level >= 3;
  const veryHard = level >= 5;

  const pools = {

    // ── INTRATUIN HORECA / KOFFIEBAR ──
    intratuin_horeca: [
      { type:'choice', icon:'👩', text:'Een klant zegt: "Mag ik een cappuccino?"', sub:'Wat doe jij?',
        choices:[
          {icon:'✅', text:'Je noteert de bestelling en herhaalt hem', correct:true},
          {icon:'📱', text:'Je kijkt op je telefoon', correct:false, feedback:'Dat begrijp ik — even snel kijken voelt normaal. Op de werkvloer is het fijn als je de klant even voorrang geeft. Daarna mag de telefoon weer.'},
          {icon:'🚶', text:'Je loopt weg', correct:false, feedback:'Misschien wist je even niet wat je moest doen. Dat is oké! Blijf staan en zeg: "Momentje, ik kom eraan." Dan voelt de klant zich gezien.'}
        ], tip:'Altijd de bestelling herhalen zodat je zeker weet wat iemand wil.' },
      { type:'click', icon:'☕', text:'Maak de cappuccino!', sub:'Tik op wat je nodig hebt', order:['☕','🥛','🫖'],
        items:[{i:'☕',l:'Espressokop'},{i:'🥛',l:'Melk'},{i:'🫖',l:'Melkopschuimer'},{i:'🍵',l:'Theezakje'},{i:'🧃',l:'Sap'},{i:'🍰',l:'Cake'}],
        tip:'Voor een cappuccino heb je een espressokop, melk en een melkopschuimer nodig.' },
      { type:'choice', icon:'😤', text:'Een klant klaagt: "Dit is te koud!"', sub:'Wat doe jij?',
        choices:[
          {icon:'😊', text:'Je zegt sorry en maakt een nieuwe', correct:true},
          {icon:'🙄', text:'Je haalt je schouders op', correct:false, feedback:'Als je schouders ophaalt, bedoel je er waarschijnlijk niks mee. Maar de klant kan het verkeerd opvatten. Een klein "sorry" doet wonderen.'},
          {icon:'😡', text:'Je zegt dat hij ongelijk heeft', correct:false, feedback:'Soms heb je misschien wél gelijk. Maar discussie met een klant maakt het moeilijker. Een nieuwe koffie aanbieden is sneller en fijner voor iedereen.'}
        ], tip:'Klachten netjes oplossen is heel belangrijk in de horeca.' },
      ...(hard ? [
        { type:'click', icon:'📋', text:'Tafel 3 bestelt: koffie, thee en een stuk appeltaart', sub:'Tik op alle drie in de juiste volgorde',
          order:['☕','🍵','🍰'],
          items:[{i:'☕',l:'Koffie'},{i:'🍵',l:'Thee'},{i:'🍰',l:'Appeltaart'},{i:'🧃',l:'Sap'},{i:'🫧',l:'Schuim'},{i:'🍪',l:'Koek'},{i:'🥤',l:'Cola'}],
          tip:'Bij meerdere bestellingen: rustig een voor een afwerken.' },
        { type:'choice', icon:'🏃', text:'Het is druk! Er staan 4 klanten te wachten.', sub:'Wat is de beste aanpak?',
          choices:[
            {icon:'📝', text:'Je helpt ze op volgorde en vraagt even geduld', correct:true},
            {icon:'😰', text:'Je raakt in paniek en maakt fouten', correct:false, feedback:'Druk kan echt overweldigend zijn. Haal even adem. Eén klant tegelijk, dan gaat het vanzelf beter.'},
            {icon:'🚪', text:'Je roept om hulp van de baas', correct:false, feedback:'Hulp vragen mag altijd! Maar als je er zelf even mee door kunt, is op volgorde werken en even geduld vragen ook prima.'}
          ], tip:'Rustig blijven en op volgorde werken is altijd het beste.' }
      ] : []),
      ...(veryHard ? [
        { type:'click', icon:'💸', text:'Reken af! Koffie €2,50 + taart €3,00', sub:'Tik op het juiste bedrag',
          order:['€5,50'],
          items:[{i:'€4,50',l:'€4,50'},{i:'€5,50',l:'€5,50'},{i:'€6,00',l:'€6,00'},{i:'€5,00',l:'€5,00'}],
          tip:'€2,50 + €3,00 = €5,50' }
      ] : [])
    ],

    // ── INTRATUIN WINKEL ──
    intratuin_winkel: [
      { type:'choice', icon:'🛒', text:'Een klant vraagt: "Waar staan de cactussen?"', sub:'Wat zeg jij?',
        choices:[
          {icon:'😊', text:'Je loopt mee en wijst het aan', correct:true},
          {icon:'🤷', text:'Je zegt dat je het niet weet', correct:false, feedback:'Het is eerlijk dat je het zegt. Je kunt er ook bij zeggen: "Ik zoek het even voor je uit." Dan helpt het toch.'},
          {icon:'📱', text:'Je wijst naar een bord zonder te kijken', correct:false, feedback:'Je wil de klant helpen, dat is goed! Maar even meelopen voelt voor de klant veel fijner dan wijzen.'}
        ], tip:'Klanten meenemen naar het product is het beste.' },
      { type:'click', icon:'📦', text:'Vul het rek! Welke planten horen hier?', sub:'Tik op de kamerplanten',
        order:['🌵','🪴','🌿'],
        items:[{i:'🌵',l:'Cactus'},{i:'🪴',l:'Potplant'},{i:'🌿',l:'Groene plant'},{i:'🌹',l:'Roos'},{i:'🍎',l:'Appel'},{i:'🐟',l:'Vis'}],
        tip:'Kamerplanten zijn planten voor binnen.' },
      { type:'choice', icon:'💰', text:'Een klant wil betalen. De kassa piept raar.', sub:'Wat doe jij?',
        choices:[
          {icon:'🙋', text:'Je vraagt een collega om hulp', correct:true},

  const key = place + '_' + role;
  const pool = pools[key] || pools['mcdonalds_kassa'];

  // Sessiebrede rotatie: bijhoud welke indices al gebruikt zijn
  const trackKey = 'used_' + key;
  if (!state.usedIndices) state.usedIndices = {};
  if (!state.usedIndices[trackKey]) state.usedIndices[trackKey] = [];

  const used = state.usedIndices[trackKey];

  // Splits pool in ongebruikt en gebruikt
  const unused = pool.map((_, i) => i).filter(i => !used.includes(i));

  // Als ongebruikt leeg of te klein: reset en begin opnieuw
  const count = Math.min(3 + level, pool.length);
  if (unused.length < count) {
    state.usedIndices[trackKey] = [];
    unused.push(...pool.map((_, i) => i));
  }

  // Shuffle de ongebruikte indices
  for (let i = unused.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [unused[i], unused[j]] = [unused[j], unused[i]];
  }

  const picked = unused.slice(0, count);
  // Markeer als gebruikt voor deze sessie
  state.usedIndices[trackKey].push(...picked);

  return picked.map(i => pool[i]);
}

  state.place = place;
  const pd = PLACES[place];
  document.getElementById('role-title').textContent = pd.name + ' — kies jouw rol';
  document.getElementById('role-sub').textContent = 'Welke taak ga jij doen?';
  const grid = document.getElementById('role-grid');
  grid.innerHTML = '';
  pd.roles.forEach(r => {
    const card = document.createElement('div');
    card.className = 'role-card';
    card.style.borderColor = pd.color;
    card.innerHTML = `<div class="role-icon">${r.icon}</div>
      <div class="role-info">
        <div class="role-name">${r.name}</div>
        <div class="role-desc">${r.desc}</div>
      </div>
      <div style="font-size:1.5rem">→</div>`;
    card.onclick = () => startGame(place, r.id);
    grid.appendChild(card);
  });
  showScreen('roleselect');
}

function startGame(place, role) {
  const sameRole = state.place === place && state.role === role;
  state.place = place; state.role = role;
  state.score = 0; state.correct = 0; state.wrong = 0; state.streak = 0;
  if (!sameRole) { state.usedIndices = {}; state.usedInvasies = []; }
  if (state.level < 1) state.level = 1;
  if (sameRole && state.level > 1) {
    showToast('🔥 Je start op level ' + state.level + '!', false);
  }
  state.scenarios = getScenarios(place, role, state.level);
  state.current = 0;
  state.dots = state.scenarios.map(() => 'pending');

  const pd = PLACES[place];
  const roleData = pd.roles.find(r => r.id === role);
  document.getElementById('hud-place').textContent = pd.name + ' — ' + (roleData ? roleData.name : '');
  updateHUD();
  showScreen('game');
  renderScenario();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = state.score + ' pts';
  document.getElementById('hud-level').textContent = 'Lvl ' + state.level;
  const stars = state.correct >= 5 ? '⭐⭐⭐' : state.correct >= 3 ? '⭐⭐' : '⭐';
  document.getElementById('hud-stars').textContent = stars;
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer(seconds) {
  clearInterval(state.timerInterval);
  state.timeMax = seconds;
  state.timeLeft = seconds;
  updateTimerBar();
  state.timerInterval = setInterval(() => {
    state.timeLeft -= 0.1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      updateTimerBar();
      clearInterval(state.timerInterval);
      onTimeOut();
    } else {
      updateTimerBar();
    }
  }, 100);
}

function updateTimerBar() {
  const pct = (state.timeLeft / state.timeMax) * 100;
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? 'var(--green)' : pct > 25 ? 'var(--yellow)' : 'var(--red)';
}

function onTimeOut() {
  showToast('⏱️ Te langzaam!', true);
  state.wrong++;
  state.streak = 0;
  if (state.dots[state.current] === 'pending') state.dots[state.current] = 'fail';
  updateDots();
  setTimeout(() => nextScenario(), 1200);
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderScenario() {
  if (state.current >= state.scenarios.length) { endGame(); return; }
  const sc = state.scenarios[state.current];
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  // dots
  const dotsDiv = document.createElement('div');
  dotsDiv.className = 'progress-dots';
  dotsDiv.id = 'dots';
  state.scenarios.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.current ? (state.dots[i] === 'fail' ? ' fail' : ' done') : i === state.current ? ' current' : '');
    dotsDiv.appendChild(d);
  });
  area.appendChild(dotsDiv);

  // scenario card
  const card = document.createElement('div');
  card.className = 'scenario-card';
  card.innerHTML = `<div class="scenario-icon">${sc.icon}</div>
    <div><div class="scenario-text">${sc.text}</div>
    ${sc.sub ? `<div class="scenario-subtext">${sc.sub}</div>` : ''}</div>`;
  area.appendChild(card);

  if (sc.type === 'choice') renderChoice(sc, area);
  else if (sc.type === 'click') renderClick(sc, area);

  // timer — adaptive
  const baseTime = 20 - (state.level * 2);
  const t = Math.max(8, baseTime);
  startTimer(t);
}

function updateDots() {
  const dotsDiv = document.getElementById('dots');
  if (!dotsDiv) return;
  const dots = dotsDiv.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (i < state.current ? (state.dots[i] === 'fail' ? ' fail' : ' done') : i === state.current ? ' current' : '');
  });
}

// ── CHOICE ──
function renderChoice(sc, area) {
  const div = document.createElement('div');
  div.className = 'choices';
  sc.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.style.animationDelay = (idx * 0.05) + 's';
    btn.innerHTML = `<span class="choice-icon">${c.icon}</span>${c.text}`;
    btn.onclick = () => onChoice(c, btn, div, sc);
    div.appendChild(btn);
  });
  area.appendChild(div);
}

function onChoice(c, btn, container, sc) {
  clearInterval(state.timerInterval);
  const btns = container.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  if (c.correct) {
    btn.classList.add('correct');
    const pts = 10 + (state.streak * 2) + state.level * 2;
    state.score += pts;
    state.correct++;
    state.streak++;
    state.dots[state.current] = 'ok';
    showToast('⭐ Super! +' + pts, false);
    if (state.streak >= 2) checkLevelUp();
    updateHUD(); updateDots();
    if (sc.tip) showTip('💡 ' + sc.tip);
  } else {
    btn.style.borderColor = 'var(--orange)';
    btn.style.background = 'rgba(230,126,34,0.12)';
    state.streak = 0;
    state.dots[state.current] = 'ok';
    updateHUD(); updateDots();
    const feedbackText = c.feedback || 'Dat snap ik. Toch werkt een andere aanpak hier beter.';
    showTip('🤔 ' + feedbackText + (sc.tip ? '<br><br>💡 ' + sc.tip : ''));
    showToast('💬 Goede poging!', false);
  }
  showVolgendeKnop();
}

const PERSONS = [
  { name: 'Yusuf', avatar: '👨🏽‍💼', color: '#2980b9' },
  { name: 'Sara',  avatar: '👩🏻‍💼', color: '#8e44ad' },

  { name: 'Fatima',avatar: '👩🏾‍🦱', color: '#c0392b' },
  { name: 'Lars',  avatar: '👨🏻‍🦰', color: '#d35400' },
  { name: 'Noa',   avatar: '👧🏽',   color: '#16a085' },
  { name: 'Kevin', avatar: '🧑🏿‍💼', color: '#2c3e50' },
  { name: 'Lena',  avatar: '👩🏼‍🦳', color: '#7d3c98' },
];

function renderClick(sc, area) {
  const isNeedGame = sc.items.some(it => it.need !== undefined);
  let remaining;

  if (isNeedGame) {
    remaining = sc.items.filter(it => it.need).map(it => it.i);
  } else {
    remaining = [...sc.order];
  }

  // Kies een willekeurige persoon
  const person = PERSONS[Math.floor(Math.random() * PERSONS.length)];

  // Persoon-bubble
  const personDiv = document.createElement('div');
  personDiv.style.cssText = `display:flex;align-items:center;gap:0.75rem;
    background:var(--card2);border-radius:var(--radius);padding:0.9rem 1rem;
    border-left:4px solid ${person.color};margin-bottom:0.5rem;`;

  const avatarEl = document.createElement('div');
  avatarEl.style.cssText = `font-size:2.2rem;flex-shrink:0;`;
  avatarEl.textContent = person.avatar;

  const speechDiv = document.createElement('div');
  const nameEl = document.createElement('div');
  nameEl.style.cssText = `font-size:0.75rem;font-weight:800;color:${person.color};margin-bottom:0.2rem;`;
  nameEl.textContent = person.name;

  const msgEl = document.createElement('div');
  msgEl.style.cssText = `font-size:0.95rem;font-weight:700;color:var(--text);line-height:1.3;`;

  // Bericht afhankelijk van type
  if (isNeedGame) {
    msgEl.textContent = sc.text;
  } else {
    const orderEmojis = sc.order.join(' ');
    const requests = [
      `"Kun jij ${orderEmojis} voor me pakken?"`,
      `"Ik heb ${orderEmojis} nodig, kun jij dat regelen?"`,
      `"Mag ik ${orderEmojis} van je?"`,
      `"Zou jij ${orderEmojis} kunnen klaarzetten?"`,
    ];
    msgEl.textContent = requests[Math.floor(Math.random() * requests.length)];
  }

  speechDiv.appendChild(nameEl);
  speechDiv.appendChild(msgEl);
  personDiv.appendChild(avatarEl);
  personDiv.appendChild(speechDiv);
  area.appendChild(personDiv);

  // Bouw knoppen — voor items die meerdere keren in remaining zitten, meerdere knoppen maken
  const shuffledItems = [...sc.items].sort(() => Math.random() - 0.5);

  // Tel hoe vaak elk item nodig is
  const neededCount = {};
  if (!isNeedGame) {
    remaining.forEach(i => { neededCount[i] = (neededCount[i] || 0) + 1; });
  }

  // Maak de itemlijst uit: duplicaten krijgen extra knoppen
  const expandedItems = [];
  if (!isNeedGame) {
    shuffledItems.forEach(item => {
      const count = neededCount[item.i] || 0;
      if (count > 1) {
        for (let k = 0; k < count; k++) {
          expandedItems.push({ ...item, l: item.l + (k > 0 ? ' ' + (k + 1) : '') });
        }
      } else {
        expandedItems.push(item);
      }
    });
    // Shuffle opnieuw na uitbreiding
    expandedItems.sort(() => Math.random() - 0.5);
  } else {
    expandedItems.push(...shuffledItems);
  }

  const clickArea = document.createElement('div');
  clickArea.className = 'click-area';
  const title = document.createElement('div');
  title.className = 'click-title';
  title.textContent = isNeedGame ? 'Tik op de planten die hulp nodig hebben!' : 'Tik op de juiste items:';
  clickArea.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'items-grid';

  let clickedWrong = false;

  expandedItems.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'item-btn';
    btn.innerHTML = `<span class="item-icon">${item.i}</span><span class="item-label">${item.l}</span>`;

    if (isNeedGame && item.need) {
      const bubble = document.createElement('div');
      bubble.className = 'plant-bubble';
      bubble.textContent = item.need;
      btn.appendChild(bubble);
    }

    btn.onclick = () => {
      if (btn.classList.contains('correct')) return;
      clearInterval(state.timerInterval);

      const isNeeded = isNeedGame ? !!item.need : remaining.includes(item.i);

      if (isNeeded) {
        btn.classList.add('correct');
        remaining.splice(remaining.indexOf(item.i), 1);

        if (remaining.length === 0) {
          const pts = 15 + state.level * 3 + (clickedWrong ? 0 : 5);
          state.score += pts;
          state.correct++;
          state.streak++;
          state.dots[state.current] = 'ok';
          showToast('⭐ Compleet! +' + pts, false);
          if (state.streak >= 2) checkLevelUp();
          updateHUD(); updateDots();
          if (sc.tip) showTip('💡 ' + sc.tip);
          showVolgendeKnop();
        }
      } else {
        btn.style.borderColor = 'var(--orange)';
        btn.style.background = 'rgba(230,126,34,0.12)';
        clickedWrong = true;
        state.streak = 0;
        showToast('💬 Probeer een ander!', false);
        updateHUD();
        setTimeout(() => {
          btn.style.borderColor = '';
          btn.style.background = '';
        }, 900);
      }
    };
    grid.appendChild(btn);
  });

  clickArea.appendChild(grid);
  area.appendChild(clickArea);
}

function maybeInvasie() {
  // Kans op invasie: 30% na elke 2e opdracht, alleen als streak >= 2
  if (state.streak < 2) return false;
  if (state.current % 2 !== 0) return false;
  if (Math.random() > 0.35) return false;
  return true;
}

function triggerInvasie() {
  const pool = INVASIES[state.place] || INVASIES.mcdonalds;
  // Kies een invasie die nog niet recent gebruikt is
  if (!state.usedInvasies) state.usedInvasies = [];
  const unused = pool.filter((_, i) => !state.usedInvasies.includes(i));
  const pickPool = unused.length > 0 ? unused : pool;
  const idx = Math.floor(Math.random() * pickPool.length);
  const invasie = pickPool[idx];
  state.usedInvasies.push(pool.indexOf(invasie));

  clearInterval(state.timerInterval);
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  // Alarm banner
  const alarm = document.createElement('div');
  alarm.style.cssText = 'background:#e74c3c;color:#fff;border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;gap:0.75rem;animation:sIn 0.2s ease;';
  alarm.innerHTML = `
    <div style="font-size:2.5rem;animation:shake 0.5s ease infinite">${invasie.icon}</div>
    <div>
      <div style="font-weight:900;font-size:0.8rem;letter-spacing:0.1em;opacity:0.85">${invasie.alarm}</div>
      <div style="font-weight:800;font-size:1rem;line-height:1.3">${invasie.text}</div>
    </div>`;
  area.appendChild(alarm);

  // Keuzes
  const choices = document.createElement('div');
  choices.className = 'choices';
  invasie.choices.forEach((c, idx2) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.style.animationDelay = (idx2 * 0.08) + 's';
    btn.innerHTML = `<span class="choice-icon">${c.icon}</span>${c.text}`;
    btn.onclick = () => {
      choices.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      if (c.correct) {
        btn.classList.add('correct');
        state.score += 20 + state.level * 3;
        showToast('🚨 Crisis opgelost! +' + (20 + state.level * 3), false);
        updateHUD();
        if (invasie.tip) showTip('💡 ' + invasie.tip);
      } else {
        btn.style.borderColor = 'var(--orange)';
        btn.style.background = 'rgba(230,126,34,0.12)';
        const fb = c.feedback || 'Dat snap ik. In een crisis werkt een andere aanpak beter.';
        showTip('🤔 ' + fb + (invasie.tip ? '<br><br>💡 ' + invasie.tip : ''));
        showToast('💬 Goede poging!', false);
      }
      showVolgendeKnop();
    };
    choices.appendChild(btn);
  });
  area.appendChild(choices);
}

// ═══════════════════════════════════════════════
// LEVEL UP
// ═══════════════════════════════════════════════
function checkLevelUp() {
  if (state.streak >= 3 && state.level < 6) {
    state.level++;
    state.streak = 0;
    showToast('🔥 Level ' + state.level + '! Sneller nu!', false);
    const harder = getScenarios(state.place, state.role, state.level);
    const newSc = harder[Math.floor(Math.random() * harder.length)];
    if (newSc && state.current < state.scenarios.length - 1) {
      state.scenarios.splice(state.current + 1, 0, newSc);
      state.dots.splice(state.current + 1, 0, 'pending');
    }
  }
}

// ═══════════════════════════════════════════════
// NEXT / END
// ═══════════════════════════════════════════════
function showVolgendeKnop() {
  const area = document.getElementById('game-area');
  if (area.querySelector('.volgende-btn')) return;
  const btn = document.createElement('button');
  btn.className = 'volgende-btn';
  btn.innerHTML = 'Volgende →';
  btn.onclick = () => nextScenario();
  area.appendChild(btn);
  btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextScenario() {
  state.current++;
  if (maybeInvasie()) {
    triggerInvasie();
  } else {
    renderScenario();
  }
}

function showTip(tip) {
  const area = document.getElementById('game-area');
  const existing = area.querySelector('.tip-box');
  if (existing) existing.remove();
  const box = document.createElement('div');
  box.className = 'tip-box';
  box.style.cssText = 'background:rgba(241,196,15,0.1);border:2px solid var(--yellow);border-radius:12px;padding:0.7rem 1rem;font-size:0.85rem;color:var(--yellow);';
  box.innerHTML = '💡 ' + tip;
  area.appendChild(box);
}

function endGame() {
  clearInterval(state.timerInterval);
  const total = state.correct + state.wrong;
  const pct = total > 0 ? Math.round((state.correct / total) * 100) : 0;
  const stars = pct >= 80 ? '⭐⭐⭐' : pct >= 50 ? '⭐⭐' : '⭐';
  const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '😊' : '💪';
  const titles = pct >= 80 ? 'Geweldig gedaan!' : pct >= 50 ? 'Goed bezig!' : 'Blijf oefenen!';
  const tips = {
    intratuin: 'Bij Intratuin/Scalabor draait alles om planten, klanten en samenwerken. Of je nu in de horeca, winkel of het magazijn werkt: vriendelijkheid en zorgvuldigheid zijn key.',
    papendal: 'Bij Papendal is het belangrijk om snel en netjes te werken voor de sporters.',
    mcdonalds: "Bij McDonald's telt elke seconde. Vriendelijk, snel en nauwkeurig."
  };

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = titles;
  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-score').textContent = `Je scoorde ${state.score} punten · ${pct}% goed · Level ${state.level}`;
  document.getElementById('result-tip').textContent = tips[state.place] || '';
  showScreen('result');
}

function maakScreenshot(auto) {
  const el = document.getElementById('result');
  const status = document.getElementById('screenshot-status');
  if (status) status.textContent = '📸 Bezig met opslaan...';
  html2canvas(el, {
    backgroundColor: '#1a1a2e',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    const naam = state.place ? state.place : 'stage';
    link.download = 'stagesimulator_score_' + naam + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    if (status) status.textContent = '✅ Screenshot opgeslagen!';
    setTimeout(() => { if (status) status.textContent = ''; }, 3000);
  }).catch(() => {
    if (status) status.textContent = '❌ Opslaan niet gelukt. Maak een foto van het scherm.';
  });
}

// Toon score bij afsluiten als er een actieve game is
window.addEventListener('beforeunload', (e) => {
  if (state.score > 0) {
    // Trigger screenshot automatisch als result-scherm zichtbaar is
    const resultVisible = document.getElementById('result').classList.contains('active');
    if (!resultVisible) {
      // Forceer result scherm kort zichtbaar voor screenshot
      endGame();
      setTimeout(() => maakScreenshot(true), 300);
    }
    e.preventDefault();
    e.returnValue = '';
  }
});

function playAgain() {
  startGame(state.place, state.role);
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, bad) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'feedback-toast show' + (bad ? ' bad' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1200);
}
</script>
